version: '3.8'

services:
  # Service Database
  db_taskmaster:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: AdyansyahCsx123
      POSTGRES_DB: taskmaster_db
    ports:
      - "5432:5432"

  # Service Backend
  backend_taskmaster:
    build: ./taskmaster-backend
    ports:
      - "5000:5000"
    depends_on:
      - db_taskmaster
    environment:
      DB_HOST: db_taskmaster
      DB_NAME: taskmaster_db
      DB_USER: postgres
      DB_PASS: AdyansyahCsx123